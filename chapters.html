<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Love Journey | Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); --accent: #ff4d6d; }
        body { background: #000; color: white; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        #space-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .timeline-container { padding: 120px 20px; display: flex; flex-direction: column; align-items: center; }
        .card { width: 90%; max-width: 350px; margin: 20px 0; background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3); padding: 20px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: scale(1.05); }
        .card h3 { font-family: 'Cinzel Decorative'; color: var(--gold); margin: 0; }
        .search-box { position: fixed; top: 0; width: 100%; padding: 20px 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; }
        input { padding: 10px; border-radius: 20px 0 0 20px; border: 1px solid var(--gold); background: #111; color: #fff; width: 120px; }
        button { padding: 10px 20px; border-radius: 0 20px 20px 0; border: none; background: var(--gold); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <div class="search-box">
        <input type="number" id="jumpInput" placeholder="Day 1-5000">
        <button onclick="jumpTo()">Jump 🚀</button>
    </div>
    <div class="timeline-container" id="timeline-list"></div>

    <script>
        const list = document.getElementById('timeline-list');
        for(let i=1; i<=5000; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `day-${i}`;
            card.innerHTML = `<h3>DAY ${i}</h3><p>Hamara Ek Aur Haseen Din ❤️</p>`;
            card.onclick = () => { window.location.href = `day.html?d=${i}`; };
            list.appendChild(card);
        }
        function jumpTo() {
            const val = document.getElementById('jumpInput').value;
            const target = document.getElementById(`day-${val}`);
            if(target) target.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
    </script>
</body>
</html>
