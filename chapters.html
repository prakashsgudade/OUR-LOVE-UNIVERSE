<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline | Infinite Love</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; }
        .search-nav { position: fixed; top: 0; width: 100%; background: #000; padding: 15px 0; border-bottom: 1px solid #333; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #d4af37; background: #111; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding: 100px 20px; }
        .day-card { background: #111; padding: 20px; border: 1px solid #222; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .day-card:hover { border-color: #d4af37; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="search-nav">
        <input type="number" id="jump" placeholder="Jump to Day (1-5000)">
        <button onclick="window.location.href='day.html?d='+document.getElementById('jump').value">Go</button>
    </div>
    <div class="grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for(let i=1; i<=5000; i++) {
            grid.innerHTML += `<div class="day-card" onclick="window.location.href='day.html?d=${i}'">Day ${i}</div>`;
        }
    </script>
</body>
</html>
