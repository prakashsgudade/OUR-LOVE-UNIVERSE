<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Love Journey | Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --glass: rgba(255, 255, 255, 0.05); 
            --accent: #ff4d6d; 
            --space-bg: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        body { 
            background: #000; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Space Background */
        #space-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background: var(--space-bg); 
        }

        /* Search Box - Responsive & Sticky */
        .search-box { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding: 15px 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); 
            z-index: 1000; 
            display: flex; 
            justify-content: center; 
            border-bottom: 1px solid var(--gold); 
        }

        .search-box input { 
            padding: 12px 15px; 
            border-radius: 30px 0 0 30px; 
            border: 1px solid var(--gold); 
            background: #111; 
            color: #fff; 
            width: 130px; 
            outline: none; 
            font-weight: bold; 
        }

        .search-box button { 
            padding: 12px 20px; 
            border-radius: 0 30px 30px 0; 
            border: none; 
            background: linear-gradient(45deg, var(--gold), #f39c12); 
            color: black; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .search-box button:active { transform: scale(0.95); }

        /* Timeline Layout */
        .timeline-container { 
            padding: 100px 10px 50px 10px; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timeline-line { 
            position: fixed; 
            left: 50%; 
            width: 2px; 
            height: 100%; 
            background: linear-gradient(transparent, var(--gold), var(--accent), transparent); 
            z-index: -1; 
            transform: translateX(-50%); 
        }

        /* Day Cards */
        .card { 
            width: 90%; 
            max-width: 350px; 
            margin: 25px 0; 
            background: var(--glass); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            backdrop-filter: blur(10px); 
            transition: all 0.4s ease; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card:hover { 
            border-color: var(--accent); 
            transform: scale(1.05) translateY(-5px); 
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.3); 
            background: rgba(255, 255, 255, 0.08); 
        }

        .card h3 { 
            font-family: 'Cinzel Decorative'; 
            color: var(--gold); 
            margin: 0; 
            font-size: 1.3rem; 
            letter-spacing: 2px; 
        }

        .card p { 
            font-family: 'Great Vibes'; 
            font-size: 1.2rem; 
            color: #ffb3b3; 
            margin: 8px 0 0 0; 
        }

        /* Navigation Buttons */
        .nav-btn { 
            position: fixed; 
            right: 15px; 
            width: 45px; 
            height: 45px; 
            background: var(--gold); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: black; 
            font-size: 1.2rem;
            cursor: pointer; 
            z-index: 1000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            transition: 0.3s;
        }
        
        .nav-btn:hover { transform: scale(1.1); background: var(--accent); color: white; }
        #goUp { bottom: 75px; } 
        #goDown { bottom: 20px; }

        /* Jump Highlight Animation */
        .jump-highlight { 
            animation: highlightEffect 2s ease; 
        }

        @keyframes highlightEffect { 
            0% { box-shadow: 0 0 0px var(--accent); transform: scale(1); } 
            50% { box-shadow: 0 0 40px var(--accent); transform: scale(1.1); border-color: var(--accent); } 
            100% { box-shadow: 0 0 0px var(--accent); transform: scale(1); } 
        }

        /* Mobile View Fixes */
        @media (max-width: 480px) {
            .search-box input { width: 100px; font-size: 0.9rem; }
            .card h3 { font-size: 1.1rem; }
            .card p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="space-bg"></div>

    <div class="search-box">
        <input type="number" id="jumpInput" placeholder="Day 1-5000" min="1" max="5000">
        <button onclick="jumpTo()">Jump 🚀</button>
    </div>

    <div class="timeline-container">
        <div class="timeline-line"></div>
        <div id="timeline-list"></div>
    </div>

    <div id="goUp" class="nav-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</div>
    <div id="goDown" class="nav-btn" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">▼</div>

    <script>
        const TOTAL_DAYS = 5000;
        const list = document.getElementById('timeline-list');

        // Fast Rendering Engine
        function renderTimeline() {
            const fragment = document.createDocumentFragment();
            for(let i=1; i<=TOTAL_DAYS; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `day-${i}`;
                
                // Content for cards
                let subtext = i <= 10 ? "Pehli Yaadein ✨" : "Naya Ehsaas ❤️";
                card.innerHTML = `<h3>DAY ${i}</h3><p>${subtext}</p>`;
                
                // IMPORTANT: Link with Folder Structure
                card.onclick = () => { 
                    window.location.href = `chapters/day.html?d=${i}`; 
                };
                
                fragment.appendChild(card);
            }
            list.appendChild(fragment);
        }

        // Jump to Day Logic
        function jumpTo() {
            const val = document.getElementById('jumpInput').value;
            const target = document.getElementById(`day-${val}`);
            if(target) {
                target.scrollIntoView({behavior: 'smooth', block: 'center'});
                target.classList.add('jump-highlight');
                
                // Remove highlight after 2s
                setTimeout(() => target.classList.remove('jump-highlight'), 2000);
            } else { 
                alert("Arey Muskan ke liye 1 se 5000 tak koi din chuno! ❤️"); 
            }
        }

        // Run on load
        window.onload = renderTimeline;
    </script>
</body>
</html>
